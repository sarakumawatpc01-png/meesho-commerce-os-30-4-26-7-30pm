version: '3.9'

# ── Meesho Commerce OS — Docker Compose ──────────────────────
# Safe non-conflicting host ports:
#   Postgres  → 127.0.0.1:15432
#   Redis     → 127.0.0.1:16379
#   Engine    → 127.0.0.1:13001
#   Admin UI  → 127.0.0.1:13000
#   Nginx     → 0.0.0.0:80 / 443  (needs these open for HTTPS)
# Container → container communication uses service names (postgres, redis, etc.)

services:

  postgres:
    image: postgres:16-alpine
    container_name: meesho_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-meesho_engine}
      POSTGRES_USER:     ${POSTGRES_USER:-meesho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - meesho_postgres_data:/var/lib/postgresql/data
      - ./engine/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meesho} -d ${POSTGRES_DB:-meesho_engine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meesho_internal

  redis:
    image: redis:7-alpine
    container_name: meesho_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - meesho_redis_data:/data
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - meesho_internal

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: meesho_engine
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:    production
      PORT:        3001
      # Use Docker service names for internal DNS — MUST override .env values
      DATABASE_URL: postgresql://${POSTGRES_USER:-meesho}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meesho_engine}
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "127.0.0.1:13001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - meesho_site_files:/app/sites
      - meesho_engine_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - meesho_internal

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: meesho_admin_ui
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:                        production
      PORT:                            3000
      # NEXT_PUBLIC_ENGINE_URL must be empty so browser JS calls go to same-origin
      # (nginx then proxies /admin/api/ to the engine container internally)
      NEXT_PUBLIC_ENGINE_URL:          ""
      NEXT_PUBLIC_SUPERADMIN_DOMAIN:   ${SUPERADMIN_DOMAIN:-meesho.agencyfic.com}
    ports:
      - "127.0.0.1:13000:3000"
    depends_on:
      engine:
        condition: service_healthy
    networks:
      - meesho_internal

  nginx:
    image: nginx:1.25-alpine
    container_name: meesho_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - meesho_site_files:/var/www/sites:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - meesho_nginx_logs:/var/log/nginx
    depends_on:
      engine:
        condition: service_healthy
      admin-ui:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - meesho_internal

volumes:
  meesho_postgres_data:
  meesho_redis_data:
  meesho_site_files:
  meesho_engine_logs:
  meesho_nginx_logs:

networks:
  meesho_internal:
    name: meesho_internal
    driver: bridge
